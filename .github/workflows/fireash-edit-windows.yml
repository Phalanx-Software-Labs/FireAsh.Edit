# Builds one file: FireAsh.Edit.exe — everything bundled, no Python needed on the user's PC.
# Run: Actions → "Build FireAsh.Edit (Windows)" → Run workflow.
# Download the artifact and attach it to a GitHub Release (or let users download the zip from the run).

name: Build FireAsh.Edit (Windows)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install PyInstaller
        run: pip install "pyinstaller>=6,<8"

      - name: Build FireAsh.Edit.exe
        working-directory: fireash-pc-patcher
        run: python -m PyInstaller --noconfirm FireAsh.Edit.spec

      - name: Upload exe (what users download)
        uses: actions/upload-artifact@v4
        with:
          name: FireAsh.Edit-Windows-exe
          path: fireash-pc-patcher/dist/FireAsh.Edit.exe

# One button: builds FireAsh.Edit.exe and creates a GitHub Release with it attached.
# Users go to Releases → open the "Windows" release → download FireAsh.Edit.exe (not Code → ZIP).

name: Publish Windows release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version only, e.g. 1.0.0 (creates tag v1.0.0-windows)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  publish:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install PyInstaller
        run: pip install "pyinstaller>=6,<8"

      - name: Build FireAsh.Edit.exe
        working-directory: fireash-pc-patcher
        run: python -m PyInstaller --noconfirm FireAsh.Edit.spec

      - name: Create GitHub Release (users download the exe from Assets)
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          TAG="v${{ inputs.version }}-windows"
          gh release create "$TAG" \
            fireash-pc-patcher/dist/FireAsh.Edit.exe \
            --title "FireAsh.Edit for Windows (v${{ inputs.version }})" \
            --notes-file fireash-pc-patcher/RELEASE-WINDOWS-USERS.md
